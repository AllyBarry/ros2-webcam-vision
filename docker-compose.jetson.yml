# Jetson (aarch64) variant of docker-compose.yml.
#
# Host prerequisites:
#   1. NVIDIA Jetson with JetPack 5.x or 6.x flashed (gives you CUDA,
#      cuDNN, TensorRT and the nvidia container runtime).
#   2. Docker configured with the nvidia runtime as default OR
#      `--runtime nvidia` / the per-service `runtime: nvidia` below.
#      Verify with: `docker info | grep -i runtime`.
#   3. A UVC webcam plugged into the Jetson (CSI cameras need a different
#      capture stack -- this compose targets v4l2 USB cameras like the
#      Logitech BRIO/C920/C270).
#
# Find your L4T tag on the Jetson:
#   cat /etc/nv_tegra_release | head -1
#   # e.g. "# R36 (release), REVISION: 4.0" -> tag is r36.4.0
#
# Pick BASE_IMAGE + PYPI_INDEX_URL for your JetPack and export them
# before running compose (or edit the defaults under the `base` service).
# Defaults below target JetPack 6.1/6.2 (L4T r36.4.x, CUDA 12.6, cuDNN 9);
# only export overrides if your JetPack differs.
#
# The base is the official NVIDIA l4t-jetpack image (CUDA + cuDNN + TRT
# baked in). ROS Humble is apt-installed on top inside Dockerfile.base.jetson.
# cuXXX in PYPI_INDEX_URL must match the base image's cuDNN major (mismatch
# fails at runtime with "libcudnn.so.X: cannot open shared object file").
#
#   # JetPack 6.1 / 6.2 (cuDNN 9) -- DEFAULT
#   export BASE_IMAGE=nvcr.io/nvidia/l4t-jetpack:r36.4.0
#   export PYPI_INDEX_URL=https://pypi.jetson-ai-lab.io/jp6/cu126
#
#   # JetPack 6.0 (cuDNN 8)
#   export BASE_IMAGE=nvcr.io/nvidia/l4t-jetpack:r36.3.0
#   export PYPI_INDEX_URL=https://pypi.jetson-ai-lab.io/jp6/cu122
#
#   # JetPack 5.1.x (cuDNN 8)
#   export BASE_IMAGE=nvcr.io/nvidia/l4t-jetpack:r35.4.1
#   export PYPI_INDEX_URL=https://pypi.jetson-ai-lab.io/jp5/cu114
#
# GUI services (`tune`) need access to the host's X server. Two cases:
#
#   A. Local Jetson desktop (terminal opened inside the desktop session):
#        xhost +local:docker                  # one-time per login session
#        ... then run compose normally.
#
#   B. SSH session with X11 forwarding (`ssh -Y jetson` -- DISPLAY is
#      "localhost:NN.0"): xhost is not enough, the container also needs
#      the SSH-forwarded auth cookie. Run once per SSH session:
#        export XAUTH=/tmp/.docker.xauth
#        rm -f $XAUTH && touch $XAUTH
#        xauth nlist $DISPLAY | sed -e 's/^..../ffff/' | xauth -f $XAUTH nmerge -
#        chmod 644 $XAUTH
#      The compose mounts $XAUTH into the container.  Use `ssh -Y` not
#      `ssh -X` -- the SECURITY-extension restrictions on -X reject the
#      container's connections regardless of the cookie.
#
# Recommended order on a fresh setup:
#   # one-time per session (case A or B above)
#   docker compose -f docker-compose.jetson.yml --profile build build base   # ~20-30 min on Orin Nano
#   docker compose -f docker-compose.jetson.yml build vlm                    # fast subsequent (~30 s)
#   docker compose -f docker-compose.jetson.yml --profile tune run --rm tune  # adjust focus/exposure
#   docker compose -f docker-compose.jetson.yml run --rm save-settings
#   docker compose -f docker-compose.jetson.yml --profile calibrate run --rm calibrate
#   docker compose -f docker-compose.jetson.yml --profile viz up
#
# Sanity-check GPU access from inside the container:
#   docker compose -f docker-compose.jetson.yml run --rm --entrypoint python3 vlm \
#       -c "import torch; print(torch.cuda.is_available(), torch.cuda.get_device_name(0))"

x-vlm-base: &vlm_base
  build:
    context: .
    dockerfile: docker/Dockerfile.jetson
  image: ros2_vlm_vision-jetson:latest
  runtime: nvidia
  privileged: true
  volumes:
    - /dev:/dev
    - ./camera_info:/root/.ros/camera_info
  environment:
    ROS_DOMAIN_ID: "42"
    RMW_IMPLEMENTATION: rmw_fastrtps_cpp
    # Capture device. Left empty so the per-service shell wrappers can
    # auto-resolve via /dev/v4l/by-id/usb-*${DEVICE_NAME_MATCH}*-video-index0
    # (a stable per-camera symlink that survives /dev/videoN renumbering
    # across replug). Override either knob explicitly when needed:
    #   CAMERA_DEVICE=/dev/videoN     docker compose ... run --rm <svc>
    #   DEVICE_NAME_MATCH=C920        docker compose ... run --rm <svc>
    # The `vlm` service's launch file does its own by-id resolution
    # (video_device:=auto, device_name_match:=BRIO) and ignores
    # CAMERA_DEVICE; the env var matters only for `tune` and
    # `save-settings` which call v4l2 tools directly.
    CAMERA_DEVICE: ${CAMERA_DEVICE:-}
    DEVICE_NAME_MATCH: ${DEVICE_NAME_MATCH:-BRIO}
    # Make all visible GPUs available; on Jetson this is the integrated
    # iGPU, but the env var is what the nvidia runtime keys off.
    NVIDIA_VISIBLE_DEVICES: all
    NVIDIA_DRIVER_CAPABILITIES: all

services:
  # Heavy base image: l4t-jetpack (CUDA/cuDNN/TRT) + apt-installed ROS
  # Humble + Jetson AI Lab torch + ultralytics + YOLO weights. Build
  # once with:
  #   docker compose -f docker-compose.jetson.yml --profile build build base
  # See top-of-file comments for BASE_IMAGE / PYPI_INDEX_URL options.
  base:
    profiles: ["build"]
    build:
      context: .
      dockerfile: docker/Dockerfile.base.jetson
      args:
        BASE_IMAGE: ${BASE_IMAGE:-nvcr.io/nvidia/l4t-jetpack:r36.4.0}
        # cuXXX must match BASE_IMAGE's CUDA/cuDNN. Default cu126 pairs
        # with r36.4.x (JP 6.1/6.2, cuDNN 9). Use cu122 for r36.2.0/r36.3.0
        # (JP 6.0, cuDNN 8) or jp5/cu114 for r35.* (JP 5.1.x).
        PYPI_INDEX_URL: ${PYPI_INDEX_URL:-https://pypi.jetson-ai-lab.io/jp6/cu126}
    image: ros2_vlm_vision-base-jetson:latest
    command: ["true"]

  # Default service: camera + detector on GPU (device:=cuda:0 set in the
  # Dockerfile's CMD).
  #
  # network_mode: host (not the bridge network) is required for ROS 2
  # DDS to be visible from other machines on the LAN. With the bridge
  # network, the container's DDS announcements carry its 172.x bridge
  # IP as the locator -- not routable from outside the host, so peers
  # see the announcement but can't reach back to subscribe. With host
  # networking the container shares the host's network stack, so
  # announcements carry the host's LAN IP and bidirectional discovery
  # works. Trade-off: any `ports:` mappings on this service are ignored
  # (the bind is implicit on the host).
  vlm:
    <<: *vlm_base
    container_name: vlm_vision
    network_mode: host
    restart: unless-stopped

  # Interactive control tuner. Opens qv4l2 with a live preview using the
  # host's X server. See the top-of-file comment for the host-side
  # setup required (xhost OR an xauth file mount).
  #
  # Uses network_mode: host so the container reaches both the X socket
  # (local desktop case) and the SSH-forwarded TCP display
  # localhost:NN.0 (SSH X11 case).
  #
  # XAUTH defaults to /tmp/.docker.xauth -- harmless when not in the SSH
  # case as long as you ran the xhost step. Override with
  #     XAUTH=/some/path docker compose ... run --rm tune
  # or pre-create /tmp/.docker.xauth (the readme snippet does this).
  tune:
    <<: *vlm_base
    profiles: ["tune"]
    container_name: vlm_tune
    network_mode: host
    environment:
      ROS_DOMAIN_ID: "42"
      RMW_IMPLEMENTATION: rmw_fastrtps_cpp
      CAMERA_DEVICE: ${CAMERA_DEVICE:-}
      DEVICE_NAME_MATCH: ${DEVICE_NAME_MATCH:-BRIO}
      DISPLAY: ${DISPLAY:-:0}
      XAUTHORITY: /tmp/.docker.xauth
      QT_X11_NO_MITSHM: "1"
      # qv4l2 uses Qt's OpenGL widget for the video preview. Over SSH
      # X11, GLX is forwarded but no hardware OpenGL is available --
      # Qt reports "Unrecognized OpenGL version" then crashes. The fix
      # is to force Mesa's llvmpipe software path:
      #   LIBGL_ALWAYS_SOFTWARE=1     -> Mesa loads swrast_dri.so
      #                                  instead of hardware drivers
      #   QT_OPENGL=software          -> Qt prefers software GL paths
      #   __GLX_VENDOR_LIBRARY_NAME   -> libglvnd dispatches GLX to
      #                                  Mesa explicitly, not any
      #                                  NVIDIA libGL that may be
      #                                  bind-mounted in by the
      #                                  nvidia container runtime.
      # Do NOT set QT_XCB_GL_INTEGRATION=none -- that disables Qt's
      # XCB-GL integration entirely, and qv4l2 then has no GL context
      # to use at all ("Cannot create platform OpenGL context, neither
      # GLX nor EGL are enabled").
      LIBGL_ALWAYS_SOFTWARE: "1"
      QT_OPENGL: software
      __GLX_VENDOR_LIBRARY_NAME: mesa
      # Silences "QStandardPaths: XDG_RUNTIME_DIR not set, defaulting
      # to '/tmp/runtime-root'" -- harmless but noisy.
      XDG_RUNTIME_DIR: /tmp/runtime-root
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      LD_LIBRARY_PATH: /usr/local/cuda/lib64:/usr/lib/aarch64-linux-gnu/nvidia:/usr/local/lib/python3.10/dist-packages/nvidia/cudnn/lib
    volumes:
      - /usr/local/cuda:/usr/local/cuda:ro
      - /usr/lib/aarch64-linux-gnu/nvidia:/usr/lib/aarch64-linux-gnu/nvidia:ro
      - /dev:/dev
      - ./camera_info:/root/.ros/camera_info
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTH:-/tmp/.docker.xauth}:/tmp/.docker.xauth:ro
    entrypoint: ["/entrypoint.sh"]
    # Auto-resolve the camera node via /dev/v4l/by-id/ (stable per-camera
    # symlinks). CAMERA_DEVICE env wins if explicitly set; otherwise we
    # readlink the symlink matching DEVICE_NAME_MATCH; final fallback is
    # /dev/video0 so the error message is the recognisable "No such file".
    # The `$$` is compose's escape for a literal `$` in the YAML --
    # the shell-time evaluation happens inside the container.
    command:
      - sh
      - -c
      - |
        DEV="$${CAMERA_DEVICE:-$$(readlink -f /dev/v4l/by-id/usb-*$${DEVICE_NAME_MATCH}*-video-index0 2>/dev/null | head -1)}"
        DEV="$${DEV:-/dev/video0}"
        echo "[tune] camera device: $$DEV"
        exec qv4l2 -d "$$DEV"
    restart: "no"

  # Dumps the live v4l2 control state back to camera_info/v4l2_params.yaml
  # so the values picked in `tune` survive container restarts.
  save-settings:
    <<: *vlm_base
    profiles: ["tune"]
    container_name: vlm_save_settings
    entrypoint: ["/entrypoint.sh"]
    # Same by-id auto-resolution as the `tune` service; the resolved
    # path is passed as $1 to save_camera_settings.sh.
    command:
      - sh
      - -c
      - |
        DEV="$${CAMERA_DEVICE:-$$(readlink -f /dev/v4l/by-id/usb-*$${DEVICE_NAME_MATCH}*-video-index0 2>/dev/null | head -1)}"
        DEV="$${DEV:-/dev/video0}"
        echo "[save-settings] camera device: $$DEV"
        exec /usr/local/bin/save_camera_settings.sh "$$DEV"
    network_mode: host
    restart: "no"

  # Intrinsic / extrinsic calibration. Lands camera.yaml + extrinsics.yaml
  # under ./camera_info/ on the host so the `vlm` service auto-loads them
  # on its next start.
  calibrate:
    <<: *vlm_base
    profiles: ["calibrate"]
    container_name: vlm_calibrate
    network_mode: host
    command: >
      ros2 launch ros2_vlm_vision calibration.launch.py mode:=intrinsic
    restart: "no"

  # Foxglove WebSocket bridge for in-browser visualisation. Runs on
  # host networking so it (a) shares the same DDS stack as the `vlm`
  # service and (b) binds 0.0.0.0:8765 directly on the host LAN IP --
  # the bridge is reachable from any LAN client (or via SSH tunnel).
  foxglove:
    <<: *vlm_base
    profiles: ["viz"]
    container_name: vlm_foxglove
    depends_on: [vlm]
    network_mode: host
    command: >
      ros2 run foxglove_bridge foxglove_bridge
      --ros-args
      -p port:=8765
      -p address:=0.0.0.0
      -p send_buffer_limit:=10000000
    restart: unless-stopped
