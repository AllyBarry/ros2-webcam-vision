intrinsic_calibration_node:
  ros__parameters:
    image_topic: /image_raw
    board_cols: 9
    board_rows: 6
    square_size_m: 0.025
    samples_required: 25
    min_centre_distance_px: 60.0
    output_path: /tmp/rgb_intrinsics.yaml

extrinsic_calibration_node:
  ros__parameters:
    color_topic: /image_raw
    info_topic: /camera_info
    board_cols: 9
    board_rows: 6
    square_size_m: 0.025
    reference_frame: calibration_target
    camera_frame: camera
    samples_required: 40
    output_path: /tmp/camera_extrinsics.yaml
