intrinsic_calibration_node:
  ros__parameters:
    image_topic: /image_raw
    board_cols: 9
    board_rows: 6
    square_size_m: 0.025
    samples_required: 25
    min_centre_distance_px: 60.0
    output_path: /root/.ros/camera_info/camera.yaml

apriltag_extrinsic_latcher:
  ros__parameters:
    camera_frame: camera
    anchor_tag_frame: "tag36h11:0"
    world_frame: world
    samples_required: 30
    sample_rate_hz: 5.0
    output_path: /root/.ros/camera_info/extrinsics.yaml
