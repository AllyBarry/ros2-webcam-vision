# Windows / WSL2 prerequisites:
#   1. Docker Desktop with the WSL2 backend.
#   2. usbipd-win (https://github.com/dorssel/usbipd-win). From an
#      *admin* PowerShell:
#          usbipd list                            # find the webcam VID
#          usbipd bind   --busid <BUSID>          # once per device
#          usbipd attach --wsl  --busid <BUSID>   # every Windows boot
#      The webcam appears in WSL as one or more /dev/videoN nodes.
#      Use `v4l2-ctl --list-devices` inside WSL to confirm which node
#      is the capture interface; override CAMERA_DEVICE / video_device
#      if it isn't /dev/video0.
#   3. (Optional viz) Foxglove Studio on Windows --- open
#      https://app.foxglove.dev or the desktop app and connect to
#      ws://localhost:8765 once the `viz` profile is up.
#   4. (Optional tune) WSL2 + WSLg (Windows 11 or up-to-date Win10)
#      provides the X11 server the tune service plugs into. Inside
#      WSL run `echo $DISPLAY` -- it should print something like :0.
#
# Recommended order on a fresh setup:
#   docker compose --profile build build base    # heavy, run once (~10 min)
#   docker compose build vlm                     # fast subsequent (~30 s)
#   docker compose run --rm tune                 # adjust focus/exposure/etc.
#   docker compose run --rm save-settings        # persist to camera_info/
#   docker compose --profile calibrate run --rm calibrate   # intrinsic calibration
#   docker compose --profile viz up              # run the stack
#
# After editing Python/launch/config: `docker compose build vlm` reuses the
# base layer, so the rebuild is just colcon + a couple of COPYs.

x-vlm-base: &vlm_base
  build:
    context: .
    dockerfile: docker/Dockerfile
  image: ros2_vlm_vision:latest
  privileged: true
  volumes:
    - /dev:/dev
    - ./camera_info:/root/.ros/camera_info
  environment:
    ROS_DOMAIN_ID: "0"
    RMW_IMPLEMENTATION: rmw_fastrtps_cpp
    # Default capture device. Override via env (`CAMERA_DEVICE=/dev/video1
    # docker compose run --rm <service>`) if your webcam exposes its
    # capture interface on a different /dev/videoN.
    CAMERA_DEVICE: ${CAMERA_DEVICE:-/dev/video0}

services:
  # Heavy base image (ROS + apt + pip + YOLO weights + numpy check).
  # Build once with `docker compose --profile build build base`. The
  # app `vlm` service FROMs this image, so every subsequent code change
  # only rebuilds the small colcon layer (~30 s instead of ~10 min).
  # The container itself never runs --- this is a build-only target,
  # hidden behind the `build` profile.
  base:
    profiles: ["build"]
    build:
      context: .
      dockerfile: docker/Dockerfile.base
    image: ros2_vlm_vision-base:latest
    command: ["true"]


  # Default service: applies camera_settings.txt, then runs camera +
  # detector. The entrypoint runs apply_camera_settings.sh before
  # v4l2_camera opens the device, so focus/exposure are locked in before
  # the first frame is captured.
  vlm:
    <<: *vlm_base
    container_name: vlm_vision
    networks: [ros]
    restart: unless-stopped

  # Interactive control tuner. Opens qv4l2 with a live preview that
  # forwards back to whichever X server the user is connected to.
  #
  # Cross-platform X11 plumbing:
  #   - WSL2/WSLg: /tmp/.X11-unix + /mnt/wslg give socket-based access
  #     to WSLg's X server; no cookie needed.
  #   - Jetson with SSH X11 forwarding (DISPLAY=localhost:NN.0): the
  #     container needs a FamilyWild xauth cookie matching the user's
  #     SSH session. Generate one (per-user, since multiple users may
  #     SSH into the same Jetson) by sourcing the helper before tune:
  #         source scripts/jetson_x11_setup.sh
  #         docker compose run --rm tune
  #     The helper exports XAUTH=/tmp/.docker.xauth.$USER, which this
  #     compose then bind-mounts in.
  #   - Jetson with a local desktop session (DISPLAY=:0): the same
  #     helper falls through to `xhost +local:docker`.
  #
  # network_mode: host is required for the SSH case (container has to
  # reach localhost:NN.0 in the host's network namespace) and harmless
  # on WSL2 / native Linux.
  tune:
    <<: *vlm_base
    profiles: ["tune"]
    container_name: vlm_tune
    network_mode: host
    environment:
      ROS_DOMAIN_ID: "0"
      RMW_IMPLEMENTATION: rmw_fastrtps_cpp
      CAMERA_DEVICE: ${CAMERA_DEVICE:-/dev/video0}
      DISPLAY: ${DISPLAY:-:0}
      XAUTHORITY: /tmp/.docker.xauth
      QT_X11_NO_MITSHM: "1"
    volumes:
      - /dev:/dev
      - ./camera_info:/root/.ros/camera_info
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /mnt/wslg:/mnt/wslg:rw              # WSL2 / WSLg path; harmless if absent
      # XAUTH is per-user (set by scripts/jetson_x11_setup.sh) so
      # concurrent SSH sessions don't clobber each other's cookies.
      # Fallback to /dev/null when unset -- container then has no
      # cookie, qv4l2 only works against an X server that accepts
      # cookie-less local connections (WSLg, or with xhost+).
      - ${XAUTH:-/dev/null}:/tmp/.docker.xauth:ro
    entrypoint: ["/entrypoint.sh"]
    command: ["qv4l2", "-d", "/dev/video0"]
    restart: "no"

  # Dumps the live v4l2 control state back to camera_info/camera_settings.txt
  # so the values picked in `tune` survive container restarts.
  save-settings:
    <<: *vlm_base
    profiles: ["tune"]
    container_name: vlm_save_settings
    entrypoint: ["/entrypoint.sh"]
    command: ["/usr/local/bin/save_camera_settings.sh"]
    networks: [ros]
    restart: "no"

  # Run the intrinsic or extrinsic calibration helper. The calibrated
  # YAML lands under ./camera_info/ on the host and is auto-loaded by
  # v4l2_camera next time the `vlm` service starts.
  calibrate:
    <<: *vlm_base
    profiles: ["calibrate"]
    container_name: vlm_calibrate
    networks: [ros]
    command: >
      ros2 launch ros2_vlm_vision calibration.launch.py mode:=intrinsic
    restart: "no"

  # Foxglove WebSocket bridge for in-browser visualisation of the
  # detector's topics from Windows.
  foxglove:
    <<: *vlm_base
    profiles: ["viz"]
    container_name: vlm_foxglove
    depends_on: [vlm]
    networks: [ros]
    ports:
      - "8765:8765"
    command: >
      ros2 run foxglove_bridge foxglove_bridge
      --ros-args
      -p port:=8765
      -p address:=0.0.0.0
      -p send_buffer_limit:=10000000
    restart: unless-stopped

networks:
  ros:
    driver: bridge
